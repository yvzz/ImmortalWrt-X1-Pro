name: Delete Old Workflows

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      delete_failed:
        description: '删除失败的 Workflow'
        required: true
        type: choice
        default: 'YES'
        options:
          - 'YES'
          - 'NO'
      delete_cancelled:
        description: '删除取消的 Workflow'
        required: true
        type: choice
        default: 'YES'
        options:
          - 'YES'
          - 'NO'
      retain_days:
        description: '保留天数（0 = 除正在运行的全部删除）'
        required: true
        type: number
        default: 7
  schedule:
    - cron: 0 3 * * 0

jobs:
  Cleaning:
    runs-on: ubuntu-24.04
    steps:
    - name: Delete old workflow runs
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        set -e

        RETAIN_DAYS="${{ inputs.retain_days || '7' }}"
        DELETE_FAILED="${{ inputs.delete_failed || 'YES' }}"
        DELETE_CANCELLED="${{ inputs.delete_cancelled || 'YES' }}"
        CURRENT_RUN_ID="${{ github.run_id }}"

        echo "RETAIN_DAYS=$RETAIN_DAYS, CURRENT_RUN_ID=$CURRENT_RUN_ID"

        gh run list -R ${{ github.repository }} --limit 200 \
          --json databaseId,status,conclusion,workflowName,createdAt \
          > /tmp/runs.json

        > /tmp/ids-to-delete.txt

        # delete_failed / delete_cancelled: 不受时间限制，YES 即全删
        # retain_days=0: 删全部 completed
        # retain_days>0: 删超过保留期的 completed
        > /tmp/ids-to-delete.txt

        # retain_days=0: 删全部 completed（不论状态）
        if [ "$RETAIN_DAYS" -eq 0 ]; then
          echo "Mode: delete ALL completed runs (retain_days=0)" >&2
          jq -r --arg CURRENT "$CURRENT_RUN_ID" \
            '.[] | select(.status == "completed") | select((.databaseId | tostring) != $CURRENT) | .databaseId | tostring' \
            /tmp/runs.json >> /tmp/ids-to-delete.txt
        else
          CUTOFF=$(date -u -d "$RETAIN_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)
          echo "Mode: delete runs older than $CUTOFF" >&2

          # failed/cancelled: 不受时间限制，YES 即全删
          if [ "$DELETE_FAILED" = "YES" ]; then
            echo "  + ALL failed runs (no time limit)" >&2
            jq -r --arg CURRENT "$CURRENT_RUN_ID" \
              '.[] | select(.status == "completed") | select(.conclusion == "failure") | select((.databaseId | tostring) != $CURRENT) | .databaseId | tostring' \
              /tmp/runs.json >> /tmp/ids-to-delete.txt
          fi

          if [ "$DELETE_CANCELLED" = "YES" ]; then
            echo "  + ALL cancelled runs (no time limit)" >&2
            jq -r --arg CURRENT "$CURRENT_RUN_ID" \
              '.[] | select(.status == "completed") | select(.conclusion == "cancelled") | select((.databaseId | tostring) != $CURRENT) | .databaseId | tostring' \
              /tmp/runs.json >> /tmp/ids-to-delete.txt
          fi

          # success runs: 受时间限制
          echo "  + success runs older than $CUTOFF" >&2
          jq -r --arg CURRENT "$CURRENT_RUN_ID" --arg CUTOFF "$CUTOFF" \
            '.[] | select(.status == "completed") | select(.conclusion == "success") | select((.databaseId | tostring) != $CURRENT) | select(.createdAt < $CUTOFF) | .databaseId | tostring' \
            /tmp/runs.json >> /tmp/ids-to-delete.txt
        fi

        COUNT=$(wc -l < /tmp/ids-to-delete.txt)
        echo "Found $COUNT runs to delete"

        if [ "$COUNT" -eq 0 ]; then
          exit 0
        fi

        while read -r id; do
          echo "Deleting run: $id"
          gh run delete "$id" -R ${{ github.repository }} 2>&1 | sed 's/^/  /' || echo "  Failed: $id"
        done < /tmp/ids-to-delete.txt

        echo "Done"

    - name: Delete Old Releases
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        KEEP=5
        RELEASES=$(gh release list -R ${{ github.repository }} --limit 100 --json tagName,createdAt -q 'sort_by(.createdAt) | reverse | .['"$KEEP"':] | .[].tagName')
        for tag in $RELEASES; do
          echo "Deleting release: $tag"
          gh release delete "$tag" -R ${{ github.repository }} --yes --cleanup-tag
        done

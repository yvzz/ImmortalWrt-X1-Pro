name: Delete Old Workflows

on:
  workflow_dispatch:
    inputs:

      # ─── 清理对象 ───
      do_tags:
        description: '清理孤立 Tag（无关联 Release 的 Tag）'
        required: false
        type: boolean
        default: false

      do_releases:
        description: '清理旧 Release'
        required: false
        type: boolean
        default: false

      do_workflows:
        description: '清理 Workflow Runs'
        required: false
        type: boolean
        default: false

      # ─── Release 参数 ───
      release_retention_days:
        description: 'Release 保留天数（天），0=全部删除'
        required: false
        type: number
        default: 7

      # ─── Workflow 参数 ───
      delete_by_time:
        description: '按时间删除（时间优先级高于状态勾选）'
        required: false
        type: boolean
        default: false

      retain_days:
        description: '保留最近几天（天），0=删除全部'
        required: false
        type: number
        default: 1

      delete_cancelled:
        description: '☑ 删除 cancelled 状态'
        required: false
        type: boolean
        default: false

      delete_failure:
        description: '☑ 删除 failure 状态'
        required: false
        type: boolean
        default: false

      delete_success:
        description: '☑ 删除 success 状态'
        required: false
        type: boolean
        default: false

  schedule:
    - cron: 0 3 * * 0   # 每周一 03:00 UTC

# ──────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════
  #  清理孤立 Tag
  # ════════════════════════════════════════════
  delete-tags:
    name: Delete Orphan Tags
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 勾选 do_tags 时运行；定时触发也运行
    if: ${{ inputs.do_tags || github.event_name == 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete orphan tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO=${{ github.repository }}
          echo "获取所有 Remote Tag..."
          remote_tags=$(gh api repos/$REPO/tags --jq '.[].name' 2>/dev/null)

          if [ -z "$remote_tags" ]; then
            echo "没有 Tag"
            exit 0
          fi

          deleted=0
          for tag in $remote_tags; do
            release=$(gh release view "$tag" --json tagName --jq '.tagName' 2>/dev/null || true)
            if [ -z "$release" ]; then
              echo "  删除孤立 Tag: $tag"
              gh api --method DELETE "repos/$REPO/git/refs/tags/$tag"
              deleted=$((deleted + 1))
            else
              echo "  保留 (有 Release): $tag"
            fi
          done

          echo ""
          echo "完成: 删除 ${deleted} 个孤立 Tag"

  # ════════════════════════════════════════════
  #  清理旧 Release
  # ════════════════════════════════════════════
  delete-releases:
    name: Delete Old Releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 勾选 do_releases 时运行；定时触发也运行
    if: ${{ inputs.do_releases || github.event_name == 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETENTION: ${{ inputs.release_retention_days }}
        run: |
          RETENTION=${RETENTION:-7}
          CUTOFF=$(date -d "$RETENTION days ago" +%s)
          echo "保留最近 ${RETENTION} 天的 Release"

          releases=$(gh release list \
            --exclude-drafts \
            --json tagName,publishedAt \
            --jq '.[] | "\(.publishedAt)|\(.tagName)"')

          if [ -z "$releases" ]; then
            echo "没有可删除的 Release"
            exit 0
          fi

          deleted=0
          kept=0

          while IFS='|' read -r published tag; do
            [ -z "$tag" ] && continue
            published_ts=$(date -d "$published" +%s 2>/dev/null)
            if [ -z "$published_ts" ]; then
              echo "  跳过: $tag (无法解析日期)"
              continue
            fi
            if [ "$published_ts" -lt "$CUTOFF" ]; then
              echo "  删除: $tag (发布于 $published)"
              gh release delete "$tag" --yes --repo ${{ github.repository }}
              deleted=$((deleted + 1))
            else
              echo "  保留: $tag (发布于 $published)"
              kept=$((kept + 1))
            fi
          done <<< "$releases"

          echo ""
          echo "完成: 删除 ${deleted} 个, 保留 ${kept} 个"

  # ════════════════════════════════════════════
  #  清理 Workflow Runs
  # ════════════════════════════════════════════
  delete-workflows:
    name: Delete Workflow Runs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 勾选 do_workflows 时运行；定时触发也运行
    if: ${{ inputs.do_workflows || github.event_name == 'schedule' }}
    steps:
      # ── ① 默认清理 Queued 状态的 Run（始终执行） ──
      - name: Delete Queued Runs
        run: |
          echo "▸ 清理 Queued 状态的 Workflow Runs（默认执行）"
          queued=$(gh run list --json id,status --jq '.[] | select(.status == "queued") | .id')
          if [ -z "$queued" ]; then
            echo "  没有 Queued 的 Run"
          else
            echo "$queued" | while read rid; do
              [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ queued run: $rid"
            done
          fi

      # ── ② 按时间删除（时间优先级最高，勾选后忽略状态勾选） ──
      - name: Delete by Time
        if: ${{ inputs.delete_by_time }}
        env:
          RETAIN: ${{ inputs.retain_days }}
        run: |
          echo "▸ 按时间删除：保留最近 $RETAIN 天前，删除勾选的状态"
          SINCE_DATE=$(date -d "$RETAIN days ago" -Iseconds 2>/dev/null \
            || date -v-"$RETAIN"d -Iseconds)

          if [ "${{ inputs.delete_cancelled }}" = "true" ]; then
            echo "  ▸ cancelled (${RETAIN} 天前)..."
            gh run list \
              --json id,createdAt,conclusion \
              --jq ".[] | select(.conclusion == \"cancelled\") | select(.createdAt < \"$SINCE_DATE\") | .id" | \
              while read rid; do
                [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ cancelled: $rid"
              done
          fi

          if [ "${{ inputs.delete_failure }}" = "true" ]; then
            echo "  ▸ failure (${RETAIN} 天前)..."
            gh run list \
              --json id,createdAt,conclusion \
              --jq ".[] | select(.conclusion == \"failure\") | select(.createdAt < \"$SINCE_DATE\") | .id" | \
              while read rid; do
                [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ failure: $rid"
              done
          fi

          if [ "${{ inputs.delete_success }}" = "true" ]; then
            echo "  ▸ success (${RETAIN} 天前)..."
            gh run list \
              --json id,createdAt,conclusion \
              --jq ".[] | select(.conclusion == \"success\") | select(.createdAt < \"$SINCE_DATE\") | .id" | \
              while read rid; do
                [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ success: $rid"
              done
          fi

      # ── ③ 按状态删除（未勾选"按时间删除"时生效） ──
      - name: Delete by Status Only
        if: ${{ !inputs.delete_by_time }}
        run: |
          echo "▸ 按状态删除（非时间模式）"
          ANY_CHECKED=false

          if [ "${{ inputs.delete_cancelled }}" = "true" ]; then
            ANY_CHECKED=true
            echo "  ▸ cancelled..."
            gh run list \
              --json id,conclusion \
              --jq ".[] | select(.conclusion == \"cancelled\") | .id" | \
              while read rid; do
                [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ cancelled: $rid"
              done
          fi

          if [ "${{ inputs.delete_failure }}" = "true" ]; then
            ANY_CHECKED=true
            echo "  ▸ failure..."
            gh run list \
              --json id,conclusion \
              --jq ".[] | select(.conclusion == \"failure\") | .id" | \
              while read rid; do
                [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ failure: $rid"
              done
          fi

          if [ "${{ inputs.delete_success }}" = "true" ]; then
            ANY_CHECKED=true
            echo "  ▸ success..."
            gh run list \
              --json id,conclusion \
              --jq ".[] | select(.conclusion == \"success\") | .id" | \
              while read rid; do
                [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ success: $rid"
              done
          fi

          if [ "$ANY_CHECKED" = "false" ]; then
            echo "  未勾选任何状态，无需删除"
          fi

name: Delete Old Workflows

on:
  workflow_dispatch:
    inputs:

      # ─── 清理对象 ───
      do_tags:
        description: '清理孤立 Tag（无关联 Release 的 Tag）'
        required: false
        type: boolean
        default: false

      do_releases:
        description: '清理旧 Release'
        required: false
        type: boolean
        default: false

      do_workflows:
        description: '清理 Workflow Runs'
        required: false
        type: boolean
        default: false

      # ─── Release 参数 ───
      release_retention_days:
        description: 'Release 保留天数（天），0=全部删除'
        required: false
        type: number
        default: 7

      # ─── Workflow 参数 ───
      delete_by_time:
        description: '按时间删除（时间优先级高于状态勾选）'
        required: false
        type: boolean
        default: false

      retain_days:
        description: '保留最近几天（天），0=删除全部'
        required: false
        type: number
        default: 1

      conclusion_pattern:
        description: '按状态删除时的状态（cancelled / failure / success，多选逗号分隔）'
        required: false
        type: string
        default: 'cancelled,failure'

  schedule:
    - cron: 0 3 * * 0   # 每周一 03:00 UTC

# ──────────────────────────────────────────────
jobs:

  # ════════════════════════════════════════════
  #  清理孤立 Tag
  # ════════════════════════════════════════════
  delete-tags:
    name: Delete Orphan Tags
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 勾选 do_tags 时运行；定时触发也运行
    if: ${{ inputs.do_tags || github.event_name == 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete orphan tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO=${{ github.repository }}
          echo "获取所有 Remote Tag..."
          remote_tags=$(gh api repos/$REPO/tags --jq '.[].name' 2>/dev/null)

          if [ -z "$remote_tags" ]; then
            echo "没有 Tag"
            exit 0
          fi

          deleted=0
          for tag in $remote_tags; do
            release=$(gh release view "$tag" --json tagName --jq '.tagName' 2>/dev/null || true)
            if [ -z "$release" ]; then
              echo "  删除孤立 Tag: $tag"
              gh api --method DELETE "repos/$REPO/git/refs/tags/$tag"
              deleted=$((deleted + 1))
            else
              echo "  保留 (有 Release): $tag"
            fi
          done

          echo ""
          echo "完成: 删除 ${deleted} 个孤立 Tag"

  # ════════════════════════════════════════════
  #  清理旧 Release
  # ════════════════════════════════════════════
  delete-releases:
    name: Delete Old Releases
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 勾选 do_releases 时运行；定时触发也运行
    if: ${{ inputs.do_releases || github.event_name == 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RETENTION: ${{ inputs.release_retention_days }}
        run: |
          RETENTION=${RETENTION:-7}
          CUTOFF=$(date -d "$RETENTION days ago" +%s)
          echo "保留最近 ${RETENTION} 天的 Release"

          releases=$(gh release list \
            --exclude-drafts \
            --json tagName,publishedAt \
            --jq '.[] | "\(.publishedAt)|\(.tagName)"')

          if [ -z "$releases" ]; then
            echo "没有可删除的 Release"
            exit 0
          fi

          deleted=0
          kept=0

          while IFS='|' read -r published tag; do
            [ -z "$tag" ] && continue
            published_ts=$(date -d "$published" +%s 2>/dev/null)
            if [ -z "$published_ts" ]; then
              echo "  跳过: $tag (无法解析日期)"
              continue
            fi
            if [ "$published_ts" -lt "$CUTOFF" ]; then
              echo "  删除: $tag (发布于 $published)"
              gh release delete "$tag" --yes --repo ${{ github.repository }}
              deleted=$((deleted + 1))
            else
              echo "  保留: $tag (发布于 $published)"
              kept=$((kept + 1))
            fi
          done <<< "$releases"

          echo ""
          echo "完成: 删除 ${deleted} 个, 保留 ${kept} 个"

  # ════════════════════════════════════════════
  #  清理 Workflow Runs
  # ════════════════════════════════════════════
  delete-workflows:
    name: Delete Workflow Runs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 勾选 do_workflows 时运行；定时触发也运行
    if: ${{ inputs.do_workflows || github.event_name == 'schedule' }}
    steps:
      # ── 按时间删除（时间优先级最高，勾选后忽略状态勾选） ──
      - name: Delete by Time
        if: ${{ inputs.delete_by_time }}
        env:
          PATTERN: ${{ inputs.conclusion_pattern }}
          RETAIN: ${{ inputs.retain_days }}
        run: |
          echo "▸ 按时间删除：保留最近 $RETAIN 天前的全部 Workflow"
          echo "  状态过滤: $PATTERN"

          if [ -z "$PATTERN" ]; then
            echo "  未指定状态 → 删除全部"
            gh run list --json id --jq '.[].id' | \
              while read rid; do
                [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ $rid"
              done
          else
            IFS=',' read -ra STATUS <<< "$PATTERN"
            for s in "${STATUS[@]}"; do
              echo "  ▸ 状态=${s}, 保留 ${RETAIN} 天前..."
              SINCE_DATE=$(date -d "$RETAIN days ago" -Iseconds 2>/dev/null \
                || date -v-"$RETAIN"d -Iseconds)
              gh run list \
                --json id,createdAt,conclusion \
                --jq ".[] | select(.conclusion == \"$s\") | select(.createdAt < \"$SINCE_DATE\") | .id" | \
                while read rid; do
                  [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ $rid"
                done
            done
          fi

      # ── 按状态删除（未勾选"按时间删除"时生效） ──
      - name: Delete by Status Only
        if: ${{ !inputs.delete_by_time }}
        env:
          PATTERN: ${{ inputs.conclusion_pattern }}
        run: |
          echo "▸ 按状态删除（非时间模式）"
          if [ -z "$PATTERN" ]; then
            echo "  未指定状态，无需删除"
            exit 0
          fi
          echo "  状态过滤: $PATTERN"
          IFS=',' read -ra STATUS <<< "$PATTERN"
          for s in "${STATUS[@]}"; do
            echo "  ▸ 状态=${s}..."
            gh run list \
              --json id,conclusion \
              --jq ".[] | select(.conclusion == \"$s\") | .id" | \
              while read rid; do
                [ -n "$rid" ] && gh run delete "$rid" --repo ${{ github.repository }} 2>/dev/null && echo "  ✓ $rid"
              done
          done

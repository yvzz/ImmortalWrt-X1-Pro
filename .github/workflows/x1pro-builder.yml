name: X1Pro Builder

permissions:
  contents: write

on:
  # push:
  #   branches:
  #     - main
  repository_dispatch:
    types: [ "X1Pro Update" ]
  workflow_dispatch:
    inputs:
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/padavanonly/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit进行编译，留空拉取最新源码'
        required: false
        type: string
        default: ''
      ssh:
        description: '是否执行 make menuconfig'
        required: false
        type: boolean
        default: false
      verbose:
        description: '启用详细编译日志 V=s（出错调试用）'
        required: false
        type: boolean
        default: false
      release:
        description: '是否发布编译产物到 Release'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '是否发布为预发布版本 (Pre-release)'
        required: false
        type: boolean
        default: false

env:
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo || 'https://github.com/padavanonly/immortalwrt-mt798x-6.6' }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P2_SH: diy-part2.sh
  CONFIG_FILE: config/X1Pro.config
  UPLOAD_RELEASE: ${{ github.event.inputs.release || github.event.client_payload.release }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  TZ: Asia/Shanghai

jobs:
  menuconfig:
    name: Menuconfig & Push
    if: github.event.inputs.ssh == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Check Runner
        run: |
          echo "=== Runner CPU Info ==="
          nproc && lscpu | grep -E 'Model name|CPU\(s\)|Thread|Core|Socket|CPU max|CPU min'
          echo ""
          echo "=== 内存 ==="
          free -h

      - name: Checkout
        uses: actions/checkout@v7

      - name: Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libncurses-dev build-essential git wget python3 bzip2 python3-pip
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Copy previous config if exists
        run: |
          if [ -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" ]; then
            cp -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" /workdir/openwrt/.config
          fi

      - name: Apply patches
        working-directory: /workdir/openwrt
        run: |
          # 复制自定义 DTS 文件链（与 success-build 一致）
          mkdir -p target/linux/mediatek/dts
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1.dtsi target/linux/mediatek/dts/
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1.dts target/linux/mediatek/dts/
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1-ubootmod.dts target/linux/mediatek/dts/
          # 复制 repo filogic.mk（整体替换上游，包含 oray_x1pro-v1-ubootmod 设备定义）
          cp $GITHUB_WORKSPACE/filogic.mk target/linux/mediatek/image/
          # 复制 feeds 配置
          cp $GITHUB_WORKSPACE/$FEEDS_CONF .

      - name: Update & Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e $CONFIG_FILE ] && cp -f $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: SSH connection to Menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 15

      - name: Push config to main branch
        run: |
          SRC="/workdir/openwrt/.config"
          DST="$GITHUB_WORKSPACE/${CONFIG_FILE}"
          mkdir -p "$(dirname "$DST")"
          cp -f "$SRC" "$DST"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG_FILE"
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git diff --cached --quiet || (
            git commit -m "Update config: ${CONFIG_FILE}" || true
            git pull --rebase origin $CURRENT_BRANCH
            git push -f origin HEAD:$CURRENT_BRANCH
          )

  build:
    name: Build X1Pro Firmware
    runs-on: ubuntu-24.04

    steps:
      - name: Check Runner
        run: |
          echo "=== Runner Performance ==="
          echo "CPU: $(nproc) cores ($(cat /proc/cpuinfo | grep 'model name' | head -1 | awk -F: '{print $2}'))"
          echo "Memory: $(free -h | awk '/^Mem:/ {print $2}')"
          echo "Disk: $(df -hT / | tail -1 | awk '{print $3 " " $2}')"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set BUILD_DATE env
        run: |
          BUILD_DATE=$(date +'%Y%m%d')
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "Build date: $BUILD_DATE"

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gawk unzip file wget python3 \
            python3-pip python3-setuptools python3-yaml \
            rsync curl git \
            libncurses-dev libssl-dev libelf-dev \
            zlib1g-dev time subversion gettext patch perl \
            squashfs-tools \
            python3-ply python3-docutils python3-pyelftools \
            ccache
          pip3 install pyelftools --break-system-packages 2>/dev/null || true
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Setup ccache & DL cache
        uses: actions/cache@v6
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}-${{ hashFiles('config/X1Pro.config') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: Apply patches
        working-directory: /workdir/openwrt
        run: |
          # 复制自定义 DTS 文件链（与 success-build 一致）
          mkdir -p target/linux/mediatek/dts
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1.dtsi target/linux/mediatek/dts/
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1.dts target/linux/mediatek/dts/
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1-ubootmod.dts target/linux/mediatek/dts/
          # 复制 repo filogic.mk（整体替换上游，包含 oray_x1pro-v1-ubootmod 设备定义）
          cp $GITHUB_WORKSPACE/filogic.mk target/linux/mediatek/image/
          # 复制 feeds 配置
          cp $GITHUB_WORKSPACE/$FEEDS_CONF .

      - name: Update & Install feeds
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          cd openwrt
          # 使用预先生成的完整配置
          cp -f $GITHUB_WORKSPACE/$CONFIG_FILE .config
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH
          # 应用 defconfig 确保依赖完整
          make defconfig

      - name: Compile Firmware
        id: compile
        run: |
          cd openwrt

          # 下载所有依赖
          make download -j$(nproc)

          # 跳过 ipk 包编译，只编译内核 + rootfs + sysupgrade.bin
          if grep -q "^# CONFIG_SKIP_PACKAGE_BUILD is not set$" .config; then
            sed -i 's/^# CONFIG_SKIP_PACKAGE_BUILD is not set/CONFIG_SKIP_PACKAGE_BUILD=y/' .config
          elif ! grep -q "^CONFIG_SKIP_PACKAGE_BUILD=y$" .config; then
            echo "CONFIG_SKIP_PACKAGE_BUILD=y" >> .config
          fi

          # 编译，verbose 可选
          if ${{ inputs.verbose }}; then
            make -j$(nproc) V=s 2>&1 | tee build.log
          else
            make -j$(nproc) 2>&1 | tail -30
          fi

          # 验证固件是否生成
          SYSUPGRADE=$(find bin/targets -name "*oray_x1pro-v1-ubootmod*sysupgrade.bin" 2>/dev/null | head -1)
          if [ -n "$SYSUPGRADE" ]; then
            echo "Firmware built: $SYSUPGRADE ($(du -h "$SYSUPGRADE" | cut -f1))"
            echo "name=$(basename "$SYSUPGRADE")" >> $GITHUB_OUTPUT
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No firmware found!"
            find bin/targets -name "*.bin" 2>/dev/null | head -10
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

          df -hT /workdir

      - name: List build artifacts
        run: |
          echo "=== Firmware artifacts ==="
          find openwrt/bin/targets -name "*oray_x1pro-v1-ubootmod*" 2>/dev/null | while read f; do
            echo "  $(basename $f) ($(du -h "$f" | cut -f1))"
          done

      - name: Cache save (always)
        if: always()
        uses: actions/cache@v6
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
          key: ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}-${{ hashFiles('config/X1Pro.config') }}

      - name: Upload Binaries (Artifacts)
        uses: actions/upload-artifact@v7
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt_X1Pro-openwrt-24.10-6.6-${{ env.BUILD_DATE }}
          path: |
            openwrt/bin/targets/mediatek/filogic/*oray_x1pro-v1-ubootmod*sysupgrade.bin

      - name: Generate Release Tag
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="ImmortalWrt-X1Pro-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $RELEASE_TAG"

          printf '%s\n' \
            '## ImmortalWrt X1Pro Firmware Release' \
            '' \
            'Device: Oray X1 Pro (ubootmod, 112M UBI)' \
            'Branch: openwrt-24.10-6.6' \
            'Supported Devices: R47' \
            '' \
            '## Downloads' \
            '' \
            'Download from the Assets section below, then flash via uboot Web UI.' \
            '' \
            'Built with GitHub Actions' \
            > release.txt

          echo "status=success" >> $GITHUB_OUTPUT

      - name: List sysupgrade files for release
        id: list-files
        if: steps.tag.outputs.status == 'success'
        run: |
          FIRMWARE_DIR="openwrt/bin/targets/mediatek/filogic"
          SYSUPGRADE_FILES=$(ls "$FIRMWARE_DIR"/*oray_x1pro-v1-ubootmod*squashfs-sysupgrade.bin 2>/dev/null || true)
          echo "Found sysupgrade files:"
          echo "$SYSUPGRADE_FILES"
          if [ -z "$SYSUPGRADE_FILES" ]; then
            echo "WARNING: No sysupgrade files found!"
            echo "contents=" >> $GITHUB_OUTPUT
          else
            echo "contents<<EOF" >> $GITHUB_OUTPUT
            echo "$SYSUPGRADE_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: steps.list-files.outputs.contents != ''
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: |
            openwrt/bin/targets/mediatek/filogic/*oray_x1pro-v1-ubootmod*squashfs-sysupgrade.bin

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          retain_days: 0
          keep_minimum_runs: 5

name: Build ImmortalWrt X1Pro

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: 0 15 * * *   # UTC 15:00 = 北京 23:00
  repository_dispatch:
    types: [ "X1Pro Update" ]
  workflow_dispatch:
    inputs:
      target:
        description: '选择编译目标'
        required: true
        type: choice
        default: 'all'
        options:
          - 'oray_x1pro-v1'
          - 'oray_x1pro-v1-ubootmod'
          - 'all'
      proxy:
        description: '选择代理软件'
        required: false
        type: choice
        default: 'none'
        options:
          - 'none'
          - 'openclash'
          - 'passwall'
          - 'homeproxy'
      notes:
        description: '编译备注（将写入 Release 页面）'
        required: false
        type: string
        default: ''
      repo:
        description: '指定源码仓库地址'
        required: true
        type: string
        default: 'https://github.com/yvzz/immortalwrt-mt798x-6.6'
      commit:
        description: '指定源码commit，留空拉取最新'
        required: false
        type: string
        default: ''
      ssh:
        description: 'SSH 调试 (make menuconfig)'
        required: false
        type: boolean
        default: false
      verbose:
        description: '详细编译日志 V=s'
        required: false
        type: boolean
        default: false
      release:
        description: '发布到 Release'
        required: false
        type: boolean
        default: true
      prerelease:
        description: '发布为预发布版本'
        required: false
        type: boolean
        default: false

env:
  CCACHE_DIR: /workdir/.ccache
  CCACHE_MAXSIZE: 2G
  REPO_URL: ${{ github.event.inputs.repo || github.event.client_payload.repo || 'https://github.com/yvzz/immortalwrt-mt798x-6.6' }}
  REPO_BRANCH: openwrt-24.10-6.6
  REPO_COMMIT: ${{ github.event.inputs.commit }}
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: ${{ github.event.inputs.release || github.event.client_payload.release || 'true' }}
  PRERELEASE: ${{ github.event.inputs.prerelease }}
  PROXY: ${{ github.event.inputs.proxy || github.event.client_payload.proxy || 'none' }}
  BUILD_NOTES: ${{ github.event.inputs.notes || github.event.client_payload.notes || '' }}
  TZ: Asia/Shanghai

jobs:
  # ── 计算构建矩阵 ──────────────────────────────────
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Compute target matrix
        id: set-matrix
        run: |
          TARGET="${{ github.event.inputs.target || github.event.client_payload.target || 'all' }}"
          if [ "$TARGET" = "all" ]; then
            echo 'matrix={"target":["oray_x1pro-v1","oray_x1pro-v1-ubootmod"]}' >> $GITHUB_OUTPUT
          else
            echo "matrix={\"target\":[\"$TARGET\"]}" >> $GITHUB_OUTPUT
          fi

  # ── SSH 调试（仅手动触发 + ssh=true 时） ──────────
  menuconfig:
    name: Menuconfig (${{ matrix.target }})
    if: github.event.inputs.ssh == 'true'
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve vars
        run: |
          T="${{ matrix.target }}"
          FW_GLOB="*${T}*"
          echo "FW_GLOB=$FW_GLOB" >> $GITHUB_ENV
          case "$T" in
            oray_x1pro-v1)            CONFIG_BASE="config/128m" ;;
            oray_x1pro-v1-ubootmod)  CONFIG_BASE="config/128muboot" ;;
          esac
          if [ "${{ env.PROXY }}" = "none" ]; then
            CONFIG_FILE="${CONFIG_BASE}.config"
          else
            CONFIG_FILE="${CONFIG_BASE}-${{ env.PROXY }}.config"
          fi
          echo "CONFIG_BASE=$CONFIG_BASE" >> $GITHUB_ENV
          echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
          echo "Target: $T | Config: $CONFIG_FILE | FW: $FW_GLOB"

      - name: Check Server Performance
        run: |
          echo "CPU: $(nproc) cores | $(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Init Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libncurses-dev build-essential git wget python3 bzip2 python3-pip
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source & apply patches
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          cd openwrt
          cp $GITHUB_WORKSPACE/$FEEDS_CONF .

      - name: Cache OpenWrt feeds
        uses: actions/cache@v6
        with:
          path: /workdir/openwrt/feeds
          key: ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-${{ hashFiles('feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-feeds-${{ env.REPO_BRANCH }}-

      - name: Copy previous config
        run: |
          if [ -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" ]; then
            cp -f "$GITHUB_WORKSPACE/${CONFIG_FILE}" /workdir/openwrt/.config
          fi

      - name: Update & Install feeds
        timeout-minutes: 10
        working-directory: /workdir/openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load config & apply diy scripts
        run: |
          [ -e "$CONFIG_FILE" ] && cp -f "$CONFIG_FILE" openwrt/.config
          chmod +x $DIY_P1_SH && $GITHUB_WORKSPACE/$DIY_P1_SH
          chmod +x $DIY_P2_SH && cd openwrt && $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: SSH to menuconfig
        uses: mxschmitt/action-tmate@v3
        timeout-minutes: 15

      - name: Push config
        run: |
          cp -f /workdir/openwrt/.config "$GITHUB_WORKSPACE/${CONFIG_FILE}"
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CONFIG_FILE"
          git diff --cached --quiet || (
            git commit -m "Update config: ${CONFIG_FILE}" || true
            git pull --rebase origin $(git rev-parse --abbrev-ref HEAD)
            git push -f origin HEAD:$(git rev-parse --abbrev-ref HEAD)
          )

  # ── 编译 ──────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve vars
        run: |
          T="${{ matrix.target }}"
          FW_GLOB="*${T}*"
          echo "FW_GLOB=$FW_GLOB" >> $GITHUB_ENV
          case "$T" in
            oray_x1pro-v1)            CONFIG_BASE="config/128m" ;;
            oray_x1pro-v1-ubootmod)  CONFIG_BASE="config/128muboot" ;;
          esac
          if [ "${{ env.PROXY }}" = "none" ]; then
            CONFIG_FILE="${CONFIG_BASE}.config"
          else
            CONFIG_FILE="${CONFIG_BASE}-${{ env.PROXY }}.config"
          fi
          echo "CONFIG_BASE=$CONFIG_BASE" >> $GITHUB_ENV
          echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
          echo "Target: $T | Config: $CONFIG_FILE | FW: $FW_GLOB"

      - name: Check Server Performance
        run: |
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo "CPU型号: $(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')"
          echo "内存: $(free -h | grep Mem | awk '{print $2}')"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Set BUILD_DATE
        run: |
          BUILD_DATE=$(date +'%Y%m%d')
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "Build date: $BUILD_DATE"

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gawk unzip file wget python3 \
            python3-pip python3-setuptools python3-yaml \
            rsync curl git \
            libncurses-dev libssl-dev libelf-dev \
            zlib1g-dev time subversion gettext patch perl \
            squashfs-tools \
            python3-ply python3-docutils python3-pyelftools \
            ccache
          pip3 install pyelftools --break-system-packages 2>/dev/null || true
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH --single-branch --filter=blob:none openwrt
          if [ -n "${REPO_COMMIT}" ]; then
            cd openwrt && git checkout ${REPO_COMMIT}
          fi
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Setup ccache & DL cache
        uses: actions/cache@v6
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
            /workdir/openwrt/feeds
          key: ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}
          restore-keys: |
            ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}-

      - name: Configure ccache
        run: |
          ccache --set-config=max_size=$CCACHE_MAXSIZE
          ccache --set-config=cache_dir=$CCACHE_DIR
          ccache --set-config=compression=true
          ccache -z

      - name: Apply patches
        working-directory: /workdir/openwrt
        run: |
          cp $GITHUB_WORKSPACE/$FEEDS_CONF .

      - name: Update & Install feeds
        working-directory: /workdir/openwrt
        timeout-minutes: 10
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          cd openwrt
          cp -f $GITHUB_WORKSPACE/$CONFIG_FILE .config
          chmod +x $GITHUB_WORKSPACE/$DIY_P1_SH
          $GITHUB_WORKSPACE/$DIY_P1_SH
          chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
          $GITHUB_WORKSPACE/$DIY_P2_SH
          make defconfig

      - name: Compile Firmware
        id: compile
        run: |
          cd openwrt

          # GitHub 免费 runner 7GB RAM，加 swap + 限并行
          sudo fallocate -l 4G /swapfile 2>/dev/null || sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          NPROC=$(($(nproc) > 4 ? 4 : $(nproc)))
          echo "CPU: $(nproc) cores, using -j${NPROC}"

          make download -j${NPROC}

          # binutils readelf.c musl 修复
          make toolchain/binutils/prepare V=s 2>/dev/null || true
          for rf in build_dir/toolchain-*/binutils-*/binutils/readelf.c; do
            if [ -f "$rf" ]; then
              sed -i 's/off64_t/off_t/g; s/fseeko64/fseeko/g' "$rf"
              echo "Patched $rf"
            fi
          done

          if [ "${{ inputs.verbose }}" = "true" ]; then
            make -j${NPROC} V=s 2>&1 | tee build.log
          else
            make -j${NPROC} 2>&1 | tee build.log
          fi

          if ! find bin/targets -name "${FW_GLOB}*sysupgrade.bin" 2>/dev/null | grep -q .; then
            echo "=== BUILD FAILED — last 200 lines ==="
            tail -200 build.log || true
          fi

          SYSUPGRADE=$(find bin/targets -name "${FW_GLOB}*sysupgrade.bin" 2>/dev/null | head -1)
          if [ -n "$SYSUPGRADE" ]; then
            echo "Firmware built: $SYSUPGRADE ($(du -h "$SYSUPGRADE" | cut -f1))"
            echo "name=$(basename "$SYSUPGRADE")" >> $GITHUB_OUTPUT
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "ERROR: No firmware found!"
            find bin/targets -name "*.bin" 2>/dev/null | head -10
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

          df -hT /workdir

      - name: List build artifacts
        run: |
          echo "=== Firmware artifacts ==="
          find openwrt/bin/targets -name "${FW_GLOB}*" 2>/dev/null | while read f; do
            echo "  $(basename $f) ($(du -h "$f" | cut -f1))"
          done

      - name: Cache save (always)
        if: always()
        uses: actions/cache@v6
        with:
          path: |
            /workdir/.ccache
            /workdir/openwrt/dl
            /workdir/openwrt/feeds
          key: ${{ runner.os }}-openwrt-x1pro-${{ env.REPO_BRANCH }}

      - name: Upload Binaries (Artifacts)
        uses: actions/upload-artifact@v7
        if: steps.compile.outputs.status == 'success'
        with:
          name: ImmortalWrt-${{ matrix.target }}-${{ env.PROXY }}-${{ env.BUILD_DATE }}
          path: |
            openwrt/bin/targets/mediatek/filogic/${FW_GLOB}*sysupgrade.bin

      - name: Generate Release Tag
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          BUILD_TIME=$(date +"%Y%m%d-%H%M")
          RELEASE_TAG="X1Pro-${BUILD_TIME}"
          echo "release_tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $RELEASE_TAG"

          printf '%s\n' \
            '## ImmortalWrt X1Pro Firmware' \
            '' \
            "**设备:** Oray X1 Pro" \
            "**目标:** ${{ matrix.target }}" \
            "**代理:** ${{ env.PROXY }}" \
            "**分支:** openwrt-24.10-6.6" \
            '' \
            "$([ -n "${{ env.BUILD_NOTES }}" ] && printf '%s\n\n' "**备注:** ${{ env.BUILD_NOTES }}")" \
            '## 📥 下载' \
            '' \
            '从下方 Assets 下载 sysupgrade.bin，通过 uboot Web UI 刷入。' \
            '' \
            '> 由 GitHub Actions 自动构建' \
            > release.txt

          echo "status=success" >> $GITHUB_OUTPUT

      - name: List sysupgrade files for release
        id: list-files
        if: steps.tag.outputs.status == 'success'
        run: |
          FIRMWARE_DIR="openwrt/bin/targets/mediatek/filogic"
          SYSUPGRADE_FILES=$(ls "$FIRMWARE_DIR"/${FW_GLOB}*squashfs-sysupgrade.bin 2>/dev/null || true)
          echo "Found sysupgrade files:"
          echo "$SYSUPGRADE_FILES"
          if [ -z "$SYSUPGRADE_FILES" ]; then
            echo "WARNING: No sysupgrade files found!"
            echo "contents=" >> $GITHUB_OUTPUT
          else
            echo "contents<<EOF" >> $GITHUB_OUTPUT
            echo "$SYSUPGRADE_FILES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: steps.list-files.outputs.contents != ''
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          prerelease: ${{ env.PRERELEASE == 'true' }}
          files: |
            openwrt/bin/targets/mediatek/filogic/${FW_GLOB}*squashfs-sysupgrade.bin

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          retain_days: 0
          keep_minimum_runs: 10

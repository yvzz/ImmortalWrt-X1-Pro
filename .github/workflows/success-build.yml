name: Build ImmortalWrt for Oray X1Pro

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: '启用详细编译日志（V=s，出错时开启方便调试）'
        required: false
        type: boolean
        default: false
  # push:
  #   branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Check Server Performance
        run: |
          echo "警告⚠"
          echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
          echo -e "已知CPU型号(降序): 9V74，7763，8370C，8272CL，8171M，E5-2673\n"
          echo "--------------------------CPU信息--------------------------"
          echo "CPU物理数量: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
          echo "CPU核心数量: $(nproc)"
          echo -e "CPU型号信息:$(cat /proc/cpuinfo | grep -m1 name | awk -F: '{print $2}')\n"
          echo "--------------------------内存信息--------------------------"
          echo "已安装内存详细信息:"
          echo -e "$(sudo lshw -short -C memory | grep GiB)\n"
          echo "--------------------------硬盘信息--------------------------"
          echo "硬盘数量: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
      
      - name: Checkout Projects
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential gawk unzip file wget python3 \
            python3-pip python3-setuptools python3-yaml rsync curl git \
            libncurses-dev libssl-dev libelf-dev zlib1g-dev time rsync \
            subversion gettext patch perl

      - name: Clone source
        run: git clone --depth=1 https://github.com/padavanonly/immortalwrt-mt798x-6.6 source

      - name: Cache
        uses: actions/cache@v5
        id: cache
        with:
          path: |
            source/dl
            source/staging_dir
          key: build-cache-${{ hashFiles('feeds.conf.default', '.github/workflows/build.yml', 'feeds/packages', 'feeds/luci') }}-${{ runner.os }}
          restore-keys: build-cache-${{ runner.os }}-
          action: restore

      - name: Apply patches
        working-directory: source
        run: |
          mkdir -p target/linux/mediatek/dts
          GITHUB_WORKSPACE=${{ github.workspace }}
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1.dtsi target/linux/mediatek/dts/
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1.dts target/linux/mediatek/dts/
          cp $GITHUB_WORKSPACE/mt7981b-oray-x1pro-v1-ubootmod.dts target/linux/mediatek/dts/
          cp $GITHUB_WORKSPACE/filogic.mk target/linux/mediatek/image/
          cp $GITHUB_WORKSPACE/feeds.conf.default .

      - name: Update feeds
        working-directory: source
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install luci-app-openclash
          ./scripts/feeds install -p istore luci-app-store
          ./scripts/feeds install luci-app-ttyd
          ./scripts/feeds install -a

      - name: Configure
        working-directory: source
        run: |
          cp defconfig/mt7981-ax3000.config .config
          sed -i "/CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_/d" .config
          sed -i "/CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_/d" .config
          echo "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_oray_x1pro-v1-ubootmod=y" >> .config
          echo "CONFIG_TARGET_DEVICE_PACKAGES_mediatek_filogic_DEVICE_oray_x1pro-v1-ubootmod=" >> .config

      - name: Add packages
        working-directory: source
        run: |
          for pkg in luci-app-openclash luci-app-store luci-app-ttyd \
            kmod-usb-storage kmod-usb-storage-uas \
            kmod-usb-net kmod-usb-net-rndis kmod-usb-net-cdc-ether \
            kmod-usb-net-cdc-subset kmod-usb-net-cdc-eem kmod-usb-net-cdc-ncm \
            kmod-usb-net-huawei-cdc-ncm kmod-usb-net-ipheth \
            kmod-usb-net-sierrawireless kmod-usb-net-qmi-wwan \
            kmod-usb-serial kmod-usb-serial-option kmod-usb-serial-wwan \
            kmod-usb-serial-qualcomm kmod-usb-acm kmod-usb-printer \
            kmod-usb-uhci kmod-usb-ohci kmod-usb2 kmod-usb3 \
            usbutils kmod-fs-exfat kmod-fs-ext4 kmod-fs-ntfs3 \
            kmod-fs-f2fs e2fsprogs; do
            echo "CONFIG_PACKAGE_${pkg}=y" >> .config
          done
          make defconfig

      - name: Build
        working-directory: source
        run: make -j$(nproc)${{ inputs.verbose && ' V=s' || '' }}

      - name: Cache save
        if: always()
        uses: actions/cache@v5
        with:
          path: |
            source/dl
            source/staging_dir
          key: build-cache-${{ hashFiles('feeds.conf.default', '.github/workflows/build.yml', 'feeds/packages/**', 'feeds/luci/**') }}-${{ runner.os }}
          action: save

      - name: Upload
        uses: actions/upload-artifact@v5
        with:
          name: immortalwrt-oray-x1pro
          path: source/bin/targets/mediatek/filogic/
          retention-days: 30
